services:
  claude-proxy:
    build: .
    ports:
      - "5066:5066"
    volumes:
      - ${CLAUDE_PROXY_DIR:-~/.claude/proxy}:/data
    environment:
      - WORKSPACE_PATH=/data
      - LOG_TOKEN_FORMAT=true
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - LLMSERVICE_API_KEY=${LLMSERVICE_API_KEY:-}
    restart: unless-stopped
