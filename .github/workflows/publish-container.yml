name: Publish container

# Builds the proxy image and pushes it to the GitHub Container Registry (GHCR)
# so it can be pulled as a ready-to-run image, and also publishes a
# self-contained linux-x64 binary as a GitHub Release asset so the proxy can be
# downloaded and run directly on hosts without a container runtime (e.g. the
# Vercel sandbox, which has no Docker/Podman).
#
# Versioning: fixed major.minor of 1.0; the patch number is the GitHub Actions
# run number, so it auto-increments on every run -> 1.0.1, 1.0.2, 1.0.3, ...
# Each run also (re)points the 1.0, 1, and latest tags at the newest image.
#
# Triggers:
#   - release published   -> publishes a new 1.0.<run_number> image + attaches binary to that release
#   - push of a v* tag     -> publishes a new 1.0.<run_number> image + cuts release v1.0.<run_number>
#   - manual dispatch      -> publishes a new 1.0.<run_number> image + cuts release v1.0.<run_number>
on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MAJOR_MINOR: "1.0"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version (1.0.<run_number>)
        id: version
        run: echo "version=${MAJOR_MINOR}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ env.MAJOR_MINOR }}
            type=raw,value=1
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Self-contained binary for runtimes without a container engine ----

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained linux-x64 binary
        run: |
          dotnet publish SmoothClaudeProxy/SmoothClaudeProxy.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:Version=${{ steps.version.outputs.version }} \
            -o publish/linux-x64
          tar -czf smooth-claude-proxy-linux-x64.tar.gz -C publish/linux-x64 .

      # On a published release: attach the binary to that release.
      - name: Attach binary to triggering release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: smooth-claude-proxy-linux-x64.tar.gz

      # On tag push / manual dispatch: cut a v1.0.<run_number> release marked
      # latest so releases/latest/download/<asset> always resolves.
      - name: Cut release with binary
        if: github.event_name != 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          make_latest: true
          files: smooth-claude-proxy-linux-x64.tar.gz
